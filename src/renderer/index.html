<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' blob:; style-src 'self' 'unsafe-inline'; connect-src 'self' ws: http: https: wss:; img-src 'self' data: app:; font-src 'self' data: blob:; worker-src 'self' blob:; media-src 'self' blob: app:"
    />
    <title>Shockwave</title>
    <!-- Point Excalidraw at the locally-vendored fonts (public/excalidraw/fonts,
         copied by the vendorExcalidrawFonts Vite plugin) so the drawing canvas
         works fully offline instead of fetching from the esm.sh CDN. This MUST
         run before the module bundle: Excalidraw bakes its font-URL registry
         from this global at import time, and ES import hoisting would otherwise
         run the bundle first. A full absolute URL (resolved against the html's
         baseURI) is required — Excalidraw resolves bare `/` paths against
         location.origin, which is empty under the prod file:// load. -->
    <script>
      window.EXCALIDRAW_ASSET_PATH = new URL('excalidraw/', document.baseURI).href;
    </script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.jsx"></script>
  </body>
</html>
