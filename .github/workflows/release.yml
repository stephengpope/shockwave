name: Release

# Fires when you push a version tag, e.g.  git tag v1.0.1 && git push --tags
# Builds on all three OSes and publishes the installers directly to a public
# GitHub Release (package.json build.publish.releaseType = "release"). Keep
# package.json "version" in sync with the tag you push.
on:
  push:
    tags:
      - 'v*'

# Required so the auto-provided GITHUB_TOKEN can create/upload the release.
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Provision the bundled CLI tools (firecrawl, playwright-cli) as a separate
      # top-level step — NOT a postinstall nested inside `npm ci`. A nested npm
      # install dies with EPERM on the Windows runner; a standalone step doesn't.
      - run: npm run cli-tools

      # electron-vite build + electron-builder. --publish always uploads the
      # platform's installer (and the latest*.yml auto-update feed) to the
      # public GitHub Release for this tag.
      #
      # The macOS step is separate because CSC_LINK / CSC_KEY_PASSWORD are
      # electron-builder's CROSS-PLATFORM signing vars — exposed on the Windows
      # runner they'd make it try (and fail) to sign the NSIS installer with
      # the Apple cert. Signing + notarization needs all five Apple secrets;
      # electron-builder notarizes (mac.notarize: true) using APPLE_ID /
      # APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID.
      - if: runner.os == 'macOS'
        run: npm run dist -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - if: runner.os != 'macOS'
        run: npm run dist -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Flip the draft to public ONLY after all three platforms have uploaded.
  #
  # Why: package.json build.publish.releaseType is "draft", so electron-builder
  # uploads every artifact into a draft release. electron-updater only reads
  # PUBLISHED releases, so clients cannot see the release until this job runs —
  # which makes publishing atomic. Previously releaseType was "release", so the
  # release went public the moment the first platform finished while
  # `latest-mac.yml` (written last, after ~10min of macOS notarization) was
  # still missing; Mac clients polling in that window got a 404 for the update
  # feed.
  #
  # `needs: release` requires EVERY matrix job to succeed, so a failed platform
  # leaves an unpublished draft to inspect/delete rather than a half-published
  # public release.
  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Publish the draft release
        run: gh release edit "$GITHUB_REF_NAME" --draft=false --latest --repo "$GITHUB_REPOSITORY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
